<!DOCTYPE html>
<html lang="el">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDEN WOK | Authentic Chinese Dining</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@100;200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
    
<body class="loading"> <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <header id="header">
        <nav class="lang-nav">
            <div class="lang">
                <span onclick="setLang('zh')">ZH</span>
                <span onclick="setLang('en')">EN</span>
                <span onclick="setLang('gr')">GR</span>
            </div>
        </nav>
        <h1 id="siteTitle" class="main-logo split-text"></h1>
    </header>

    <section class="hero parallax-bg">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2 id="welcome" class="split-text"></h2>
            <div class="gold-line-divider"></div>
            <p id="slogan" class="reveal-type"></p>
        </div>
    </section>

    <section class="info-section reveal">
        <h3 id="orderTitle" class="gold-subtitle"></h3>
        <div class="info-box">
            <p id="openingText" class="grey-hint"></p>
            <p id="buffetTime" class="gold-core-text"></p>
            <p id="buffetPrice" class="gold-core-text"></p>
        </div>
        <a id="orderButton" class="cta-gold-btn" href="https://www.e-food.gr/delivery/nea-smurni/golden-wok-8734941" target="_blank"></a>
    </section>

    <section class="menu-section reveal">
        <h2 id="menuTitle" class="section-title"></h2>
        <div id="menuContainer" class="modern-menu-grid"></div>
    </section>

 <section id="gallery" class="gallery-section reveal">
    <h2 id="galleryTitle" class="section-title"></h2>
    
    <button class="nav-btn prev-btn" onclick="moveGallery(-1)">&#10229;</button>
    <button class="nav-btn next-btn" onclick="moveGallery(1)">&#10230;</button>

    <div class="gallery-slider-wrapper" id="galleryContainer">
        </div>
</section>

    <section class="location-section reveal">
        <h2 id="locationTitle" class="section-title"></h2>
        <div class="map-wrapper">
            <iframe 
              id="googleMap" 
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3146.44238510656!2d23.712613476388484!3d37.94344400240974!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14a1bc24985223c3%3A0xc3f17c5b6b150c77!2sGolden%20Wok!5e0!3m2!1sen!2sgr!4v1709800000000!5m2!1sen!2sgr" 
              allowfullscreen="" 
              loading="lazy" 
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
        <div class="location-info">
            <p id="contactAddress" class="gold-address-text"></p>
            <div class="gold-dot-divider"></div> <p id="contactPhone" class="gold-address-text"></p>
        </div>
    </section>

   <footer class="minimal-footer">
    <div class="footer-logo">GOLDEN WOK</div>
    <div class="footer-dot"></div>
    <p class="footer-info">ATHENS · NEA SMYRNI</p>
    <p class="footer-copy">© 2026</p>
</footer>

    <script src="config.js"></script>
    <script src="app.js"></script>

    <div id="imageOverlay" class="image-overlay" onclick="closeImage()">
    <img id="overlayImg" src="" alt="Full View">
    <span class="close-overlay">&times;</span>
</div>

<div id="loader">
